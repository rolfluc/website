<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Layout Sidebar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="menu-toggle" class="toggle-checkbox">

    <label for="menu-toggle" class="toggle-box">Menu</label>

    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="#">Link 1</a></li>
            <li><a href="#">Link 2</a></li>
        </ul>
    </div>

    <main class="content">
        <h1>Main Content</h1>
        <p>This text will now get pushed gracefully to the right instead of being covered up!</p>
    </main>

</body>
</html>
